name: CI/CD

on:
push:
branches: ["main"]

jobs:
deploy:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout código
    uses: actions/checkout@v4

  - name: Criar arquivo .env
    run: |
      echo "MONGO_URI=${{ secrets.MONGO_URI }}" >> .env
      echo "JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}" >> .env
      echo "JWT_ALGORITHM=${{ secrets.JWT_ALGORITHM }}" >> .env
      echo "JWT_EXPIRATION_MINUTES=${{ secrets.JWT_EXPIRATION_MINUTES }}" >> .env
      echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .env
      echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> .env
      echo "GOOGLE_REDIRECT_URI=${{ secrets.GOOGLE_REDIRECT_URI }}" >> .env
      echo "FRONTEND_URL=${{ secrets.FRONTEND_URL }}" >> .env

  - name: Deploy via SSH
    uses: appleboy/ssh-action@v1.0.3
    with:
      host: 137.131.154.8
      username: ubuntu
      key: ${{ secrets.SSH_PRIVATE_KEY }}
      script: |
        if [ ! -d "/home/ubuntu/app" ]; then
          git clone https://github.com/SEU_USUARIO/SEU_REPO.git /home/ubuntu/app
        fi

        cd /home/ubuntu/app
        git pull origin main

        # cria .env no servidor
        cat > .env <<EOF
        MONGO_URI=${{ secrets.MONGO_URI }}
        JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
        JWT_ALGORITHM=${{ secrets.JWT_ALGORITHM }}
        JWT_EXPIRATION_MINUTES=${{ secrets.JWT_EXPIRATION_MINUTES }}
        GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
        GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
        GOOGLE_REDIRECT_URI=${{ secrets.GOOGLE_REDIRECT_URI }}
        FRONTEND_URL=${{ secrets.FRONTEND_URL }}
        EOF

        make down-prod || true
        make up-prod
```
